<h2>Registrar Curso</h2>
<form (ngSubmit)="createCourse()" #courseForm="ngForm">
  <input type="text" name="name" [(ngModel)]="course.name" placeholder="Nombre del curso" required>
  <input type="text" name="teacher" [(ngModel)]="course.teacher" placeholder="Profesor" required>
  <button type="submit">Guardar Curso</button>
</form>

<hr>

<div>
  <label for="courseIdSearch">Buscar por ID de curso:</label>
  <input type="number" id="courseIdSearch" [(ngModel)]="searchCourseId" name="searchCourseId">
  <button (click)="loadCourseById(searchCourseId)">Cargar Curso</button>
</div>

<table border="1" style="width:100%; text-align:left; margin-top:10px;" *ngIf="courses.length > 0">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Profesor</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let c of courses">
      <td>{{ c.id }}</td>
      <td>{{ c.name }}</td>
      <td>{{ c.teacher }}</td>
    </tr>
  </tbody>
</table>

<p *ngIf="notFound">No se encontró ningún curso con ese ID.</p>
